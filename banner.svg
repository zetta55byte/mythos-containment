<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="300" fill="#0f0f13"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#1e1e26" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1e1e26" stroke-width="1"/>

  <!-- Left: layer stack visualization -->
  <g opacity="0.85">
    <!-- 8 stacked bars, colored by category -->
    <rect x="60" y="40"  width="220" height="22" rx="4" fill="#1d9e75" opacity="0.8"/>
    <text x="72" y="56"  font-size="10" fill="#9FE1CB" font-weight="600">1. I/O membrane</text>
    <rect x="60" y="68"  width="220" height="22" rx="4" fill="#1d9e75" opacity="0.7"/>
    <text x="72" y="84"  font-size="10" fill="#9FE1CB" font-weight="600">2. Outbound strangulation</text>
    <rect x="60" y="96"  width="220" height="22" rx="4" fill="#ba7517" opacity="0.8"/>
    <text x="72" y="112" font-size="10" fill="#FAC775" font-weight="600">3. Behavioral fingerprinting</text>
    <rect x="60" y="124" width="220" height="22" rx="4" fill="#534ab7" opacity="0.9"/>
    <text x="72" y="140" font-size="10" fill="#CECBF6" font-weight="600">4. Multi-membrane consensus</text>
    <rect x="60" y="152" width="220" height="22" rx="4" fill="#993c1d" opacity="0.8"/>
    <text x="72" y="168" font-size="10" fill="#F5C4B3" font-weight="600">5. Out-of-band sentinel</text>
    <rect x="60" y="180" width="220" height="22" rx="4" fill="#1d9e75" opacity="0.6"/>
    <text x="72" y="196" font-size="10" fill="#9FE1CB" font-weight="600">6. Deterministic forensics</text>
    <rect x="60" y="208" width="220" height="22" rx="4" fill="#444441" opacity="0.9"/>
    <text x="72" y="224" font-size="10" fill="#D3D1C7" font-weight="600">7. Cold-storage zone</text>
    <rect x="60" y="236" width="220" height="22" rx="4" fill="#ba7517" opacity="0.7"/>
    <text x="72" y="252" font-size="10" fill="#FAC775" font-weight="600">8. Cross-model verification</text>
  </g>

  <!-- Arrows connecting left stack to center -->
  <line x1="282" y1="150" x2="340" y2="150" stroke="#2a2a35" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Center: title block -->
  <text x="600" y="108" text-anchor="middle" font-size="28" font-weight="700" fill="#e2e0d8">Mythos-Class Containment</text>
  <text x="600" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#e2e0d8">Architecture</text>
  <text x="600" y="170" text-anchor="middle" font-size="13" fill="#6a6860">Unified Governance · Geometry · Runtime Enforcement</text>

  <!-- DOI badge -->
  <rect x="482" y="188" width="236" height="26" rx="13" fill="#16161c" stroke="#534ab7" stroke-width="1"/>
  <text x="600" y="206" text-anchor="middle" font-size="11" fill="#afa9ec">DOI 10.5281/zenodo.19464889</text>

  <!-- Right: pipeline diagram -->
  <g opacity="0.85">
    <!-- UAG box -->
    <rect x="920" y="48" width="160" height="52" rx="6" fill="#16161c" stroke="#534ab7" stroke-width="1"/>
    <text x="1000" y="70"  text-anchor="middle" font-size="11" font-weight="700" fill="#afa9ec">UAG</text>
    <text x="1000" y="88"  text-anchor="middle" font-size="9"  fill="#6a6860">Attractor geometry</text>

    <!-- Arrow -->
    <line x1="1000" y1="100" x2="1000" y2="126" stroke="#534ab7" stroke-width="1.5" marker-end="url(#arr2)"/>

    <!-- Constitutional OS box -->
    <rect x="920" y="126" width="160" height="52" rx="6" fill="#16161c" stroke="#185fa5" stroke-width="1"/>
    <text x="1000" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#85b7eb">Constitutional OS</text>
    <text x="1000" y="166" text-anchor="middle" font-size="9"  fill="#6a6860">Formal governance</text>

    <!-- Arrow -->
    <line x1="1000" y1="178" x2="1000" y2="204" stroke="#185fa5" stroke-width="1.5" marker-end="url(#arr3)"/>

    <!-- CARE box -->
    <rect x="920" y="204" width="160" height="52" rx="6" fill="#16161c" stroke="#0f6e56" stroke-width="1"/>
    <text x="1000" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#5dcaa5">CARE v0.2.0</text>
    <text x="1000" y="244" text-anchor="middle" font-size="9"  fill="#6a6860">Runtime enforcement</text>
  </g>

  <!-- Vertical separator lines -->
  <line x1="310" y1="30" x2="310" y2="270" stroke="#1e1e26" stroke-width="1"/>
  <line x1="890" y1="30" x2="890" y2="270" stroke="#1e1e26" stroke-width="1"/>

  <!-- Bottom bar -->
  <rect x="0" y="278" width="1200" height="22" fill="#16161c"/>
  <text x="60"   y="293" font-size="10" fill="#444441">github.com/zetta55byte/mythos-containment</text>
  <text x="600"  y="293" text-anchor="middle" font-size="10" fill="#444441">v1.0 · April 2026</text>
  <text x="1140" y="293" text-anchor="end" font-size="10" fill="#444441">MIT License</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2a2a35" stroke-width="1.5"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534ab7" stroke-width="1.5"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
